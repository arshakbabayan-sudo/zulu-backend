<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="apple-touch-icon" sizes="76x76" href="/admin/assets/img/apple-icon.png">
  <link rel="icon" type="image/png" href="/admin/assets/img/favicon.png">
  <title>ZULU — Booking confirmation</title>
  <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700,900" />
  <link href="/admin/assets/css/nucleo-icons.css" rel="stylesheet" />
  <link href="/admin/assets/css/nucleo-svg.css" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link id="pagestyle" href="/admin/assets/css/material-dashboard.css?v=3.2.0" rel="stylesheet" />
</head>
<body class="bg-gray-100">
  <div class="container position-sticky z-index-sticky top-0">
    <div class="row">
      <div class="col-12">
        <nav class="navbar navbar-expand-lg blur border-radius-xl top-0 z-index-3 shadow position-absolute my-3 py-2 start-0 end-0 mx-4">
          <div class="container-fluid ps-2 pe-0">
            <a class="navbar-brand font-weight-bolder ms-lg-0 ms-3" href="/site/">ZULU</a>
            <span class="navbar-text text-sm ms-auto me-3">
              <a class="text-dark me-2" href="/site/catalog/">Catalog</a>
              <a class="text-dark me-2" href="/site/account/">Account</a>
              <a class="text-secondary text-sm" href="/admin/login/">Operator admin</a>
            </span>
          </div>
        </nav>
      </div>
    </div>
  </div>
  <main class="main-content mt-8 pt-4">
    <div class="container-fluid py-4">
      <div class="row">
        <div class="col-lg-8">
          <div class="card mb-4">
            <div class="card-header pb-0">
              <h6>Booking confirmation</h6>
              <p class="text-sm text-muted mb-0">GET /api/marketplace/bookings/{id}</p>
            </div>
            <div class="card-body">
              <div id="view-loading" class="text-center text-secondary py-4">
                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                Loading…
              </div>
              <div id="view-error" class="alert alert-danger d-none" role="alert"></div>
              <div id="view-guest" class="d-none">
                <p class="text-sm text-muted mb-2">Sign in to view this booking.</p>
                <a class="btn btn-sm bg-gradient-dark mb-0" id="guest-signin" href="/site/login/">Sign in</a>
              </div>
              <div id="view-ok" class="d-none">
                <p class="text-sm text-success mb-3">Thank you — your booking is confirmed.</p>
                <div class="table-responsive">
                  <table class="table table-sm align-items-center mb-0">
                    <tbody id="summary-rows"></tbody>
                  </table>
                </div>
                <div class="mt-3">
                  <a href="/site/catalog/" class="btn btn-sm btn-outline-dark mb-0">Back to catalog</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="/admin/assets/js/core/popper.min.js"></script>
  <script src="/admin/assets/js/core/bootstrap.min.js"></script>
  <script src="/admin/assets/js/material-dashboard.min.js?v=3.2.0"></script>
  <script src="/site/js/public-api.js"></script>
  <script>
    function isValidBookingId(value) {
      return /^[1-9]\d*$/.test(String(value || ''));
    }
    function apiErrorMessage(result, fallback) {
      if (!result) return fallback;
      if (result.status === 401) return 'Please sign in to view this booking.';
      if (result.status === 404) return 'Booking not found.';
      if (result.status === 422) return result.message || 'Booking is not ready for confirmation yet.';
      if (result.status >= 500) return 'Server error. Please try again.';
      return result.message || fallback;
    }
    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s == null ? '' : String(s);
      return d.innerHTML;
    }
    function safeNext(path) {
      if (!path || typeof path !== 'string') return null;
      if (path.indexOf('/site/') !== 0) return null;
      if (path.indexOf('//', 1) !== -1) return null;
      return path;
    }
    document.addEventListener('DOMContentLoaded', async function () {
      var params = new URLSearchParams(location.search);
      var bid = params.get('booking');
      var oid = params.get('order');
      var loading = document.getElementById('view-loading');
      var errEl = document.getElementById('view-error');
      var guest = document.getElementById('view-guest');
      var ok = document.getElementById('view-ok');
      document.getElementById('guest-signin').href =
        '/site/login/?next=' + encodeURIComponent(safeNext(params.get('next')) || location.pathname + location.search);
      var isBookingFlow = !!bid;
      var isPackageFlow = !!oid;
      if (isBookingFlow && isPackageFlow) {
        loading.classList.add('d-none');
        errEl.textContent = 'Confirmation context is ambiguous.';
        errEl.classList.remove('d-none');
        return;
      }
      if (!isBookingFlow && !isPackageFlow) {
        loading.classList.add('d-none');
        errEl.textContent = 'Missing confirmation context.';
        errEl.classList.remove('d-none');
        return;
      }
      if (isBookingFlow && !isValidBookingId(bid)) {
        loading.classList.add('d-none');
        errEl.textContent = 'Missing or invalid booking id.';
        errEl.classList.remove('d-none');
        return;
      }
      if (isPackageFlow && !isValidBookingId(oid)) {
        loading.classList.add('d-none');
        errEl.textContent = 'Missing or invalid package order id.';
        errEl.classList.remove('d-none');
        return;
      }
      if (isPackageFlow) {
        document.querySelector('.card-header h6').textContent = 'Package order confirmation';
        document.querySelector('.card-header p').textContent = 'GET /api/package-orders/{id}';
        document.querySelector('#view-ok p').textContent = 'Thank you - your package order is confirmed.';
      }
      if (!ZuluPublicApi.getToken()) {
        loading.classList.add('d-none');
        guest.classList.remove('d-none');
        return;
      }
      var result;
      try {
        result = isPackageFlow
          ? await ZuluPublicApi.packageOrderShow(oid)
          : await ZuluPublicApi.marketplaceBooking(bid);
      } catch (eLoad) {
        result = { ok: false, message: 'Could not load booking.', status: 0 };
      }
      loading.classList.add('d-none');
      if (!result || !result.ok) {
        if (result && result.status === 401) {
          guest.classList.remove('d-none');
          return;
        }
        errEl.textContent = apiErrorMessage(result, 'Could not load booking.');
        errEl.classList.remove('d-none');
        return;
      }
      var b = result.data && result.data.booking;
      var inv = result.data && result.data.invoice;
      var pay = result.data && result.data.payment;
      var order = isPackageFlow ? result.data : null;
      if (!isPackageFlow && !b) {
        errEl.textContent = 'Invalid booking response.';
        errEl.classList.remove('d-none');
        return;
      }
      if (isPackageFlow && (!order || !order.id)) {
        errEl.textContent = 'Invalid package order response.';
        errEl.classList.remove('d-none');
        return;
      }
      if (isPackageFlow && order.payment_status !== 'paid') {
        errEl.innerHTML = 'Payment is not completed yet. <a href="/site/checkout/?order=' + encodeURIComponent(oid) + '" class="alert-link">Return to checkout</a>.';
        errEl.classList.remove('d-none');
        return;
      }
      if (!isPackageFlow && (!pay || pay.status !== 'paid')) {
        errEl.innerHTML = 'Payment is not completed yet. <a href="/site/checkout/?booking=' + encodeURIComponent(bid) + '" class="alert-link">Return to checkout</a>.';
        errEl.classList.remove('d-none');
        return;
      }
      var rows = isPackageFlow
        ? [
            ['order_id', order.id],
            ['order_number', order.order_number || '—'],
            ['status', order.status],
            ['payment_status', order.payment_status],
            ['total_price', order.final_total_snapshot != null ? order.final_total_snapshot : '—'],
            ['currency', order.currency || '—'],
          ]
        : [
            ['booking_id', b.id],
            ['status', b.status],
            ['total_price', b.total_price],
            ['invoice_id', inv ? inv.id : '—'],
            ['invoice_status', inv ? inv.status : '—'],
            ['payment_id', pay ? pay.id : '—'],
            ['payment_status', pay ? pay.status : '—'],
          ];
      document.getElementById('summary-rows').innerHTML = rows
        .map(function (row) {
          var value = (row[1] == null || row[1] === '') ? '—' : row[1];
          return (
            '<tr><td class="text-secondary text-sm w-25">' +
            esc(row[0]) +
            '</td><td class="text-sm font-weight-bold">' +
            esc(value) +
            '</td></tr>'
          );
        })
        .join('');
      ok.classList.remove('d-none');
    });
  </script>
</body>
</html>
