<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="apple-touch-icon" sizes="76x76" href="/admin/assets/img/apple-icon.png">
  <link rel="icon" type="image/png" href="/admin/assets/img/favicon.png">
  <title>ZULU — Site</title>
  <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700,900" />
  <link href="/admin/assets/css/nucleo-icons.css" rel="stylesheet" />
  <link href="/admin/assets/css/nucleo-svg.css" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link id="pagestyle" href="/admin/assets/css/material-dashboard.css?v=3.2.0" rel="stylesheet" />
</head>
<body class="bg-gray-200">
  <div class="container position-sticky z-index-sticky top-0">
    <div class="row">
      <div class="col-12">
        <nav class="navbar navbar-expand-lg blur border-radius-xl top-0 z-index-3 shadow position-absolute my-3 py-2 start-0 end-0 mx-4">
          <div class="container-fluid ps-2 pe-0">
            <a class="navbar-brand font-weight-bolder ms-lg-0 ms-3" href="/site/">ZULU</a>
            <span class="navbar-text text-sm ms-auto me-3">
              <a class="text-dark me-2" href="/site/catalog/" data-i18n="site.nav.browse_offers">Browse offers</a>
              <a class="text-dark me-2 d-none" href="/site/account/" id="nav-account" data-i18n="site.nav.account">Account</a>
              <a class="text-dark me-2" href="/site/login/" id="nav-signin" data-i18n="site.nav.sign_in">Sign in</a>
              <a class="text-dark" href="/site/register/" id="nav-register" data-i18n="site.nav.register">Register</a>
              <span class="text-muted mx-2">|</span>
              <a class="text-secondary text-sm" href="/admin/login/" data-i18n="site.nav.operator_admin">Operator admin</a>
            </span>
          </div>
        </nav>
      </div>
    </div>
  </div>
  <main class="main-content mt-0">
    <div class="page-header align-items-start min-vh-100" style="background-image: url('https://images.unsplash.com/photo-1497294815431-9365093b7331?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');">
      <span class="mask bg-gradient-dark opacity-6"></span>
      <div class="container my-auto">
        <div class="row">
          <div class="col-lg-6 col-md-8 col-12 mx-auto">
            <div class="card z-index-0 fadeIn3 fadeInBottom">
              <div class="card-header p-0 position-relative mt-n4 mx-3 z-index-2">
                <div class="bg-gradient-dark shadow-dark border-radius-lg py-3 pe-1">
                  <h4 class="text-white font-weight-bolder text-center mt-2 mb-0" data-i18n="site.home.public_site">Public site</h4>
                  <p class="text-white text-sm text-center mb-0 opacity-8" data-i18n="site.home.phase_caption">Phase 8 — public catalog &amp; account</p>
                </div>
              </div>
              <div class="card-body">
                <p class="text-sm text-muted mb-3" id="site-status" data-i18n="site.home.checking_session">Checking session…</p>
                <div class="d-flex flex-wrap gap-2">
                  <a href="/site/catalog/" class="btn btn-sm bg-gradient-dark mb-0" data-i18n="site.nav.browse_offers">Browse offers</a>
                  <a href="/site/account/" class="btn btn-sm btn-outline-dark mb-0 d-none" id="btn-account" data-i18n="site.home.my_account">My account</a>
                  <a href="/site/login/" class="btn btn-sm btn-outline-dark mb-0" id="btn-signin" data-i18n="site.nav.sign_in">Sign in</a>
                  <a href="/site/register/" class="btn btn-sm btn-outline-dark mb-0" id="btn-register" data-i18n="site.nav.register">Register</a>
                  <button type="button" class="btn btn-sm btn-outline-secondary mb-0 d-none" id="btn-logout" data-i18n="site.nav.log_out">Log out</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="/admin/assets/js/core/popper.min.js"></script>
  <script src="/admin/assets/js/core/bootstrap.min.js"></script>
  <script src="/admin/assets/js/material-dashboard.min.js?v=3.2.0"></script>
  <script src="/site/js/public-api.js"></script>
  <script>
    (function () {
      function safeT(key, fallback) {
        var value = ZuluPublicApi.t(key);
        if (!value || value === key) return fallback;
        return value;
      }
      var statusEl = document.getElementById('site-status');
      var btnLogout = document.getElementById('btn-logout');
      var btnSignin = document.getElementById('btn-signin');
      var btnRegister = document.getElementById('btn-register');
      var btnAccount = document.getElementById('btn-account');
      var navAccount = document.getElementById('nav-account');
      if (ZuluPublicApi.getToken()) {
        statusEl.textContent = safeT('site.home.status_signed_in', 'You are signed in. Browse offers or open your account.');
        btnLogout.classList.remove('d-none');
        btnAccount.classList.remove('d-none');
        navAccount.classList.remove('d-none');
        btnSignin.classList.add('d-none');
        btnRegister.classList.add('d-none');
        document.getElementById('nav-signin').classList.add('d-none');
        document.getElementById('nav-register').classList.add('d-none');
      } else {
        statusEl.textContent = safeT('site.home.status_signed_out', 'You are not signed in. Use Sign in or Register.');
      }
      btnLogout.addEventListener('click', async function () {
        try {
          await ZuluPublicApi.logout();
        } catch (e) {}
        location.reload();
      });
    })();
  </script>
</body>
</html>
