<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="apple-touch-icon" sizes="76x76" href="/admin/assets/img/apple-icon.png">
  <link rel="icon" type="image/png" href="/admin/assets/img/favicon.png">
  <title>ZULU — Forgot password</title>
  <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700,900" />
  <link href="/admin/assets/css/nucleo-icons.css" rel="stylesheet" />
  <link href="/admin/assets/css/nucleo-svg.css" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link id="pagestyle" href="/admin/assets/css/material-dashboard.css?v=3.2.0" rel="stylesheet" />
</head>
<body class="bg-gray-200">
  <div class="container position-sticky z-index-sticky top-0">
    <div class="row">
      <div class="col-12">
        <nav class="navbar navbar-expand-lg blur border-radius-xl top-0 z-index-3 shadow position-absolute my-3 py-2 start-0 end-0 mx-4">
          <div class="container-fluid ps-2 pe-0">
            <a class="navbar-brand font-weight-bolder ms-lg-0 ms-3" href="/site/">ZULU</a>
            <span class="navbar-text text-sm ms-auto me-3">
              <a class="text-dark" href="/site/login/">Back to sign in</a>
            </span>
          </div>
        </nav>
      </div>
    </div>
  </div>
  <main class="main-content mt-0">
    <div class="page-header align-items-start min-vh-100" style="background-image: url('https://images.unsplash.com/photo-1497294815431-9365093b7331?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');">
      <span class="mask bg-gradient-dark opacity-6"></span>
      <div class="container my-auto">
        <div class="row">
          <div class="col-lg-4 col-md-8 col-12 mx-auto">
            <div class="card z-index-0 fadeIn3 fadeInBottom">
              <div class="card-header p-0 position-relative mt-n4 mx-3 z-index-2">
                <div class="bg-gradient-dark shadow-dark border-radius-lg py-3 pe-1">
                  <h4 class="text-white font-weight-bolder text-center mt-2 mb-0">Forgot password</h4>
                  <p class="text-white text-xs text-center mb-0 opacity-8">POST /api/forgot-password</p>
                </div>
              </div>
              <div class="card-body">
                <form id="forgot-form" role="form" class="text-start" novalidate>
                  <div id="form-error" class="alert alert-danger py-2 d-none" role="alert"></div>
                  <div id="form-success" class="alert alert-success py-2 d-none" role="alert"></div>
                  <p class="text-sm text-muted">Enter your email. If an account exists, you will receive a reset link (when mail is configured).</p>
                  <div class="input-group input-group-outline my-3">
                    <label class="form-label" for="email">Email</label>
                    <input id="email" name="email" type="email" class="form-control" required autocomplete="email">
                  </div>
                  <div class="text-center">
                    <button type="submit" id="forgot-submit" class="btn bg-gradient-dark w-100 my-2 mb-2">Send reset link</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="/admin/assets/js/core/popper.min.js"></script>
  <script src="/admin/assets/js/core/bootstrap.min.js"></script>
  <script src="/admin/assets/js/material-dashboard.min.js?v=3.2.0"></script>
  <script src="/site/js/public-api.js"></script>
  <script>
    (function () {
      var form = document.getElementById('forgot-form');
      var err = document.getElementById('form-error');
      var ok = document.getElementById('form-success');
      var btn = document.getElementById('forgot-submit');
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        err.classList.add('d-none');
        ok.classList.add('d-none');
        err.textContent = '';
        if (btn.disabled) return;
        btn.disabled = true;
        var email = document.getElementById('email').value.trim();
        if (!email) {
          btn.disabled = false;
          err.textContent = 'Request failed';
          err.classList.remove('d-none');
          return;
        }
        try {
          var result = await ZuluPublicApi.forgotPassword(email);
          if (result && result.ok) {
            var safeMessage = (result.data && result.data.message) ? String(result.data.message) : 'If the account exists, a reset link has been sent.';
            ok.textContent = safeMessage;
            ok.classList.remove('d-none');
            return;
          }
          var msg = (result && result.message) || 'Request failed';
          err.textContent = msg;
          err.classList.remove('d-none');
        } catch (e2) {
          err.textContent = 'Request failed';
          err.classList.remove('d-none');
        } finally {
          btn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
